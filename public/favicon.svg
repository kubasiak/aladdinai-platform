<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Aladdin's Lamp -->
  <defs>
    <linearGradient id="lampGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00FFFF;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#0080FF;stop-opacity:0.3" />
    </linearGradient>
  </defs>

  <!-- Background Circle -->
  <circle cx="32" cy="32" r="30" fill="#1a1a2e" stroke="#667eea" stroke-width="2"/>

  <!-- Lamp Base -->
  <ellipse cx="32" cy="48" rx="12" ry="4" fill="url(#lampGradient)" opacity="0.9"/>

  <!-- Lamp Body -->
  <path d="M 22 48 Q 20 42 22 36 L 28 26 Q 30 22 32 22 Q 34 22 36 26 L 42 36 Q 44 42 42 48 Z"
        fill="url(#lampGradient)" stroke="#B8860B" stroke-width="1.5"/>

  <!-- Lamp Spout -->
  <path d="M 42 36 Q 48 34 52 36 Q 53 37 52 38 Q 48 40 42 38 Z"
        fill="url(#lampGradient)" stroke="#B8860B" stroke-width="1"/>

  <!-- Lamp Handle -->
  <path d="M 22 36 Q 18 32 18 28 Q 18 26 20 26 Q 22 26 22 28 Q 22 32 22 36 Z"
        fill="url(#lampGradient)" stroke="#B8860B" stroke-width="1" opacity="0.9"/>

  <!-- Magic Glow/Smoke -->
  <path d="M 32 20 Q 28 16 26 12 Q 24 8 26 6 Q 28 8 30 10 Q 32 12 32 14 Q 34 12 36 10 Q 38 8 40 6 Q 42 8 40 12 Q 38 16 34 20 Z"
        fill="url(#glowGradient)" opacity="0.7">
    <animateTransform
      attributeName="transform"
      attributeType="XML"
      type="translate"
      values="0,0; 0,-2; 0,0"
      dur="2s"
      repeatCount="indefinite"/>
    <animate
      attributeName="opacity"
      values="0.5;0.8;0.5"
      dur="2s"
      repeatCount="indefinite"/>
  </path>

  <!-- Sparkles -->
  <circle cx="26" cy="14" r="1.5" fill="#00FFFF" opacity="0.8">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="38" cy="12" r="1.5" fill="#00FFFF" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="32" cy="8" r="2" fill="#FFFFFF" opacity="0.9">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="1.2s" repeatCount="indefinite"/>
  </circle>
</svg>
